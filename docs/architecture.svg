<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="Carlito, Calibri, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#3b4a5e"/>
    </marker>
    <linearGradient id="gBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff0e2"/>
      <stop offset="1" stop-color="#c4e6cb"/>
    </linearGradient>
    <linearGradient id="gBrain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4c9c9"/>
      <stop offset="1" stop-color="#d98a8a"/>
    </linearGradient>
    <linearGradient id="gHeat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c3a87"/>
      <stop offset="0.45" stop-color="#3aa0a0"/>
      <stop offset="0.7" stop-color="#e8c245"/>
      <stop offset="1" stop-color="#d6453b"/>
    </linearGradient>
    <linearGradient id="gInset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#eef2f8"/>
    </linearGradient>
    <style>
      .title { font-size: 23px; font-weight: 700; fill: #14233b; }
      .stage { font-size: 15px; font-weight: 700; fill: #14233b; }
      .sub   { font-size: 11.5px; fill: #3b4a5e; }
      .lbl   { font-size: 12.5px; font-weight: 700; fill: #14233b; }
      .mono  { font-family: 'DejaVu Sans Mono', Consolas, monospace; font-size: 11.5px; fill: #14233b; }
      .tiny  { font-size: 10.5px; fill: #5a6b80; }
      .flow  { fill: none; stroke: #3b4a5e; stroke-width: 2.2; }
      .box   { fill: url(#gBox); stroke: #3a7d44; stroke-width: 1.6; rx: 12; }
      .cap   { font-size: 13px; fill: #3b4a5e; }
      .lvlLo { fill: #5b8ff2; stroke: #2f5fb0; }
      .lvlMd { fill: #f2b134; stroke: #b07d2b; }
      .lvlHi { fill: #e0533f; stroke: #9c2e27; }
    </style>
  </defs>

  <rect width="1280" height="700" fill="#ffffff"/>

  <!-- ================= TITLE ================= -->
  <text x="40" y="46" class="title">Mind2Text: EEG &#8594; symbolic tokens &#8594; language-model classification</text>
  <line x1="40" y1="58" x2="1240" y2="58" stroke="#dde3ec" stroke-width="2"/>

  <!-- ================= MAIN PIPELINE ROW ================= -->
  <!-- 1. Raw EEG -->
  <g transform="translate(40,104)">
    <rect class="box" width="150" height="150"/>
    <g transform="translate(75,58)">
      <path d="M-38,4 C-46,-22 -20,-40 0,-32 C18,-42 46,-22 38,4
               C48,14 40,34 22,32 C14,44 -14,44 -22,32 C-40,34 -48,14 -38,4 Z"
            fill="url(#gBrain)" stroke="#a85b5b" stroke-width="1.6"/>
      <path d="M0,-32 L0,32 M-20,-26 C-6,-14 -6,8 -18,28 M20,-26 C6,-14 6,8 18,28"
            fill="none" stroke="#a85b5b" stroke-width="1.2" opacity="0.7"/>
      <circle cx="-22" cy="-10" r="3.2" fill="#14233b"/>
      <circle cx="0" cy="-22" r="3.2" fill="#14233b"/>
      <circle cx="22" cy="-10" r="3.2" fill="#14233b"/>
      <circle cx="-12" cy="14" r="3.2" fill="#14233b"/>
      <circle cx="12" cy="14" r="3.2" fill="#14233b"/>
    </g>
    <text x="75" y="116" text-anchor="middle" class="stage">Raw EEG</text>
    <text x="75" y="133" text-anchor="middle" class="sub">BIDS / BrainVision</text>
    <text x="75" y="148" text-anchor="middle" class="sub">61 ch &#183; 500 Hz</text>
  </g>

  <!-- 2. Preprocessing -->
  <g transform="translate(238,104)">
    <rect class="box" width="160" height="150"/>
    <g transform="translate(16,20)" stroke="#3a7d44" stroke-width="1.6" fill="none" opacity="0.9">
      <path d="M0,12 q8,-12 16,0 t16,0 t16,0 t16,0 t16,0 t16,0 t16,0 t16,0"/>
      <path d="M0,32 q6,10 12,-2 t12,4 t12,-6 t12,2 t12,-4 t12,5 t12,-3 t12,2 t12,-2" stroke="#2c7a7a"/>
      <path d="M0,52 q10,-6 20,3 t20,-4 t20,5 t20,-3 t20,2" stroke="#b07d2b"/>
    </g>
    <text x="80" y="100" text-anchor="middle" class="stage">Preprocessing</text>
    <text x="80" y="117" text-anchor="middle" class="sub">band-pass 1&#8211;40 Hz</text>
    <text x="80" y="131" text-anchor="middle" class="sub">50 Hz notch &#183; re-ref</text>
    <text x="80" y="145" text-anchor="middle" class="sub">windowed trials</text>
  </g>

  <!-- 3. Band power -->
  <g transform="translate(446,104)">
    <rect class="box" width="160" height="150"/>
    <g transform="translate(24,22)">
      <rect x="0" y="0" width="92" height="56" fill="url(#gHeat)" opacity="0.92" rx="3"/>
      <g stroke="#ffffff" stroke-width="1" opacity="0.55">
        <line x1="0" y1="14" x2="92" y2="14"/><line x1="0" y1="28" x2="92" y2="28"/><line x1="0" y1="42" x2="92" y2="42"/>
        <line x1="23" y1="0" x2="23" y2="56"/><line x1="46" y1="0" x2="46" y2="56"/><line x1="69" y1="0" x2="69" y2="56"/>
      </g>
      <text x="-3" y="8"  text-anchor="end" class="tiny">&#948;</text>
      <text x="-3" y="22" text-anchor="end" class="tiny">&#945;</text>
      <text x="-3" y="36" text-anchor="end" class="tiny">&#946;</text>
      <text x="-3" y="50" text-anchor="end" class="tiny">&#947;</text>
    </g>
    <text x="80" y="100" text-anchor="middle" class="stage">Band power</text>
    <text x="80" y="117" text-anchor="middle" class="sub">5 bands &#215; channels</text>
    <text x="80" y="131" text-anchor="middle" class="sub">&#948; &#952; &#945; &#946; &#947;</text>
    <text x="80" y="145" text-anchor="middle" class="sub">per-trial features</text>
  </g>

  <!-- 4. Symbolic encoder -->
  <g transform="translate(654,104)">
    <rect class="box" width="170" height="150"/>
    <g transform="translate(20,22)">
      <rect x="0" y="0"  width="40" height="11" class="lvlLo"/>
      <rect x="0" y="13" width="40" height="11" class="lvlMd"/>
      <rect x="0" y="26" width="40" height="11" class="lvlHi"/>
      <text x="48" y="9"  class="tiny">low</text>
      <text x="48" y="22" class="tiny">med</text>
      <text x="48" y="35" class="tiny">high</text>
      <rect x="96" y="2"  width="58" height="15" rx="3" fill="#fff" stroke="#3a7d44"/>
      <rect x="96" y="21" width="58" height="15" rx="3" fill="#fff" stroke="#3a7d44"/>
      <text x="125" y="13" text-anchor="middle" class="mono" style="font-size:9px">ALPHA_HI</text>
      <text x="125" y="32" text-anchor="middle" class="mono" style="font-size:9px">BETA_LO</text>
    </g>
    <text x="85" y="100" text-anchor="middle" class="stage">Symbolic encoder</text>
    <text x="85" y="117" text-anchor="middle" class="sub">bin &#8594; named token</text>
    <text x="85" y="131" text-anchor="middle" class="sub">band &#183; level &#183; channel</text>
    <text x="85" y="145" text-anchor="middle" class="sub">+ vocabulary</text>
  </g>

  <!-- 5. LLM + LoRA -->
  <g transform="translate(872,104)">
    <rect class="box" width="160" height="150"/>
    <g transform="translate(40,18)" fill="#a9d8b4" stroke="#3a7d44" stroke-width="1.4">
      <rect x="0" y="0"  width="80" height="14" rx="3"/>
      <rect x="0" y="18" width="80" height="14" rx="3"/>
      <rect x="0" y="36" width="80" height="14" rx="3"/>
      <rect x="-13" y="6" width="9" height="38" rx="2" fill="#2f6b3e" stroke="#234f2e"/>
      <rect x="84" y="6" width="9" height="38" rx="2" fill="#2f6b3e" stroke="#234f2e"/>
    </g>
    <text x="80" y="100" text-anchor="middle" class="stage">LLM + LoRA</text>
    <text x="80" y="117" text-anchor="middle" class="sub">GPT-2 / DistilGPT-2</text>
    <text x="80" y="131" text-anchor="middle" class="sub">low-rank adapters</text>
    <text x="80" y="145" text-anchor="middle" class="sub">classification head</text>
  </g>

  <!-- 6. Calibration -->
  <g transform="translate(1080,104)">
    <rect class="box" width="160" height="150"/>
    <g transform="translate(22,18)">
      <rect x="0" y="0" width="62" height="50" fill="#fff" stroke="#3a7d44" stroke-width="1.2" rx="2"/>
      <line x1="0" y1="50" x2="62" y2="0" stroke="#9aa6b6" stroke-width="1" stroke-dasharray="3,3"/>
      <path d="M2,46 L18,40 L34,26 L50,12 L60,4" fill="none" stroke="#d6453b" stroke-width="2"/>
      <circle cx="18" cy="40" r="2.2" fill="#d6453b"/><circle cx="34" cy="26" r="2.2" fill="#d6453b"/><circle cx="50" cy="12" r="2.2" fill="#d6453b"/>
    </g>
    <text x="80" y="100" text-anchor="middle" class="stage">Calibration</text>
    <text x="80" y="117" text-anchor="middle" class="sub">temperature / isotonic</text>
    <text x="80" y="131" text-anchor="middle" class="sub">ECE &#183; Brier</text>
    <text x="80" y="145" text-anchor="middle" class="sub">&#8594; cognitive state</text>
  </g>

  <!-- main flow arrows, y = 179 -->
  <g>
    <line class="flow" x1="190" y1="179" x2="232" y2="179" marker-end="url(#arrow)"/>
    <line class="flow" x1="398" y1="179" x2="440" y2="179" marker-end="url(#arrow)"/>
    <line class="flow" x1="606" y1="179" x2="648" y2="179" marker-end="url(#arrow)"/>
    <line class="flow" x1="824" y1="179" x2="866" y2="179" marker-end="url(#arrow)"/>
    <line class="flow" x1="1032" y1="179" x2="1074" y2="179" marker-end="url(#arrow)"/>
  </g>

  <!-- data-contract caption under the row -->
  <rect x="372" y="276" width="536" height="22" rx="6" fill="#ffffff" stroke="#e3e8f0" stroke-width="1"/>
  <text x="640" y="291" text-anchor="middle" class="tiny" style="font-style:italic">
    each stage exchanges a validated Pydantic entity (Trial &#8594; FeatureVector &#8594; TokenSequence)
  </text>

  <!-- zoom connectors -->
  <g stroke="#3a7d44" stroke-width="1.4" stroke-dasharray="5,4" fill="none">
    <line x1="700" y1="256" x2="180" y2="346"/>
    <line x1="780" y1="256" x2="1100" y2="346"/>
  </g>

  <!-- ============== INSET ============== -->
  <g transform="translate(60,345)">
    <rect width="1160" height="300" rx="18" fill="url(#gInset)" stroke="#cfd8e6" stroke-width="1.6"/>
    <text x="24" y="34" class="stage" style="font-size:16px">Inside the symbolic encoder: continuous features become an ordered token sequence</text>

    <!-- A. feature vector -->
    <g transform="translate(40,68)">
      <text x="80" y="-8" text-anchor="middle" class="lbl">band-power vector</text>
      <g stroke="#2c7a7a" stroke-width="1">
        <rect x="0"   y="42"  width="16" height="78"  fill="#3aa0a0"/>
        <rect x="22"  y="80"  width="16" height="40"  fill="#3aa0a0"/>
        <rect x="44"  y="20"  width="16" height="100" fill="#3aa0a0"/>
        <rect x="66"  y="94"  width="16" height="26"  fill="#3aa0a0"/>
        <rect x="88"  y="58"  width="16" height="62"  fill="#3aa0a0"/>
        <rect x="110" y="30"  width="16" height="90"  fill="#3aa0a0"/>
        <rect x="132" y="86"  width="16" height="34"  fill="#3aa0a0"/>
      </g>
      <line x1="-4" y1="120" x2="160" y2="120" stroke="#5a6b80" stroke-width="1.4"/>
      <text x="80" y="140" text-anchor="middle" class="tiny">one value per (band, channel)</text>
    </g>

    <line class="flow" x1="210" y1="128" x2="262" y2="128" marker-end="url(#arrow)"/>

    <!-- B. discretize -->
    <g transform="translate(268,70)">
      <rect width="150" height="120" rx="10" fill="#dff0e2" stroke="#3a7d44" stroke-width="1.4"/>
      <text x="75" y="26" text-anchor="middle" class="lbl">discretize</text>
      <text x="75" y="44" text-anchor="middle" class="tiny">quantile / uniform / k-means</text>
      <g transform="translate(20,58)">
        <rect x="0"  y="0" width="36" height="40" class="lvlLo" opacity="0.85"/>
        <rect x="36" y="0" width="37" height="40" class="lvlMd" opacity="0.85"/>
        <rect x="73" y="0" width="37" height="40" class="lvlHi" opacity="0.85"/>
        <rect x="0" y="0" width="110" height="40" fill="none" stroke="#3a7d44"/>
        <text x="18" y="25" text-anchor="middle" class="tiny" style="fill:#fff;font-weight:700">low</text>
        <text x="55" y="25" text-anchor="middle" class="tiny" style="fill:#14233b;font-weight:700">med</text>
        <text x="92" y="25" text-anchor="middle" class="tiny" style="fill:#fff;font-weight:700">high</text>
      </g>
    </g>

    <line class="flow" x1="418" y1="128" x2="470" y2="128" marker-end="url(#arrow)"/>

    <!-- C. name each bin -->
    <g transform="translate(476,70)">
      <rect width="186" height="120" rx="10" fill="#dff0e2" stroke="#3a7d44" stroke-width="1.4"/>
      <text x="93" y="26" text-anchor="middle" class="lbl">name each bin</text>
      <g transform="translate(16,40)">
        <rect x="0" y="0"  width="154" height="21" rx="4" fill="#fff" stroke="#3a7d44"/>
        <rect x="0" y="27" width="154" height="21" rx="4" fill="#fff" stroke="#3a7d44"/>
        <rect x="0" y="54" width="154" height="21" rx="4" fill="#fff" stroke="#3a7d44"/>
        <text x="77" y="15" text-anchor="middle" class="mono">ALPHA_HIGH_FCz</text>
        <text x="77" y="42" text-anchor="middle" class="mono">BETA_LOW_C3</text>
        <text x="77" y="69" text-anchor="middle" class="mono">THETA_MED_Pz</text>
      </g>
    </g>

    <line class="flow" x1="662" y1="128" x2="714" y2="128" marker-end="url(#arrow)"/>

    <!-- D. vocabulary -->
    <g transform="translate(720,70)">
      <rect width="176" height="120" rx="10" fill="#dff0e2" stroke="#3a7d44" stroke-width="1.4"/>
      <text x="88" y="26" text-anchor="middle" class="lbl">vocabulary</text>
      <text x="88" y="44" text-anchor="middle" class="tiny">token &#8594; integer id</text>
      <g transform="translate(18,58)" class="mono">
        <text x="0" y="12">ALPHA_HIGH_FCz</text><text x="158" y="12" text-anchor="end" fill="#2f6b3e">17</text>
        <text x="0" y="32">BETA_LOW_C3</text><text x="158" y="32" text-anchor="end" fill="#2f6b3e">42</text>
        <text x="0" y="52">[BOS] &#183; [PAD]</text><text x="158" y="52" text-anchor="end" fill="#2f6b3e">0, 1</text>
      </g>
    </g>

    <line class="flow" x1="896" y1="128" x2="948" y2="128" marker-end="url(#arrow)"/>

    <!-- E. token sequence -->
    <g transform="translate(954,68)">
      <text x="95" y="0" text-anchor="middle" class="lbl">token sequence (a trial)</text>
      <g transform="translate(0,16)">
        <rect x="0"   y="0" width="32" height="28" rx="5" fill="#5fb874" stroke="#2f6b3e"/>
        <rect x="38"  y="0" width="32" height="28" rx="5" fill="#9fd6aa" stroke="#2f6b3e"/>
        <rect x="76"  y="0" width="32" height="28" rx="5" fill="#5fb874" stroke="#2f6b3e"/>
        <rect x="114" y="0" width="32" height="28" rx="5" fill="#c4e6cb" stroke="#2f6b3e"/>
        <rect x="152" y="0" width="32" height="28" rx="5" fill="#9fd6aa" stroke="#2f6b3e"/>
        <text x="92" y="50" text-anchor="middle" class="tiny">interpretable, transformer-ready</text>
      </g>
      <g transform="translate(-3,88)">
        <rect x="0" y="0" width="194" height="46" rx="10" fill="#dff0e2" stroke="#3a7d44" stroke-width="1.4"/>
        <text x="97" y="20" text-anchor="middle" class="lbl">&#8594; LLM + LoRA</text>
        <text x="97" y="37" text-anchor="middle" class="tiny">reads the sequence, predicts state</text>
      </g>
    </g>
  </g>

  <!-- ============== BOTTOM CAPTION ============== -->
  <text x="640" y="676" text-anchor="middle" class="cap">
    Figure 1. The Mind2Text pipeline turns raw EEG into a discrete, human-readable token sequence and classifies the cognitive state with a LoRA-adapted language model.
  </text>
  <text x="640" y="694" text-anchor="middle" class="tiny">
    The inset details the symbolic encoder: band-power features are discretized, each bin is named into a token, mapped through a vocabulary, and assembled into a per-trial sequence.
  </text>
</svg>
